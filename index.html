<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PeakdleV2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>PeakdleV2</h1>
    <p>Daily Re:Zero characters. (anime only - Arc 6)</p>
    <br><br><br>
    <div class="search-container">
        <input type="text" id="guessInput" placeholder="Name" autocomplete="off">
        <ul id="suggestions"></ul>
    </div>

    <button id="guessBtn" >Guess</button>
    <div class="header-row">
        <div class="header-box">Img</div>
        <div class="header-box">Name</div>
        <div class="header-box">Gender</div>
        <div class="header-box">Role</div>
        <div class="header-box">Race</div>
        <div class="header-box">Age</div>
        <div class="header-box">Hair</div>
        <div class="header-box">Eyes</div>
        <div class="header-box">Affiliation</div>
        <div class="header-box">Arc</div>
    </div>
    <div id="gameBoard"></div>

    <script src="js.js"></script>
</body>
</html>
