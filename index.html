<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PeakdleV2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/x-icon" href="img/Flogo.jpg">
</head>
<body>

    <button id="openGalleryBtn">☰</button>

    <div id="sideGallery" class="side-gallery">
        <div class="gallery-header">
            <h3>A little help</h3>
            <button id="closeGalleryBtn">✕</button>
        </div>
        <div id="galleryContent"></div>
    </div>

    <h1>PeakdleV2</h1>
    <p>Daily Re:Zero characters. (anime only - Arc 6)</p>
    <br>
    
    <div class="search-container">
        <input type="text" id="guessInput" placeholder="Name" autocomplete="off">
        <ul id="suggestions"></ul>
    </div>

    <button id="guessBtn">Guess</button>

    <p>Tries: <span id="attemptCount">0</span></p>

<div id="winPopup" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <h2 id="winMessage"></h2>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

    <div class="header-row">
        <div class="header-box">Img</div>
        <div class="header-box">Name</div>
        <div class="header-box">Gender</div>
        <div class="header-box">Role</div>
        <div class="header-box">Race</div>
        <div class="header-box">Age</div>
        <div class="header-box">Hair</div>
        <div class="header-box">Eyes</div>
        <div class="header-box">Affiliation</div>
        <div class="header-box">Arc</div>
    </div>
    <div id="gameBoard"></div>
    <div id="winPopup" class="popup-overlay">
 
</div>
    <script src="js.js"></script>
</body>
</html>
